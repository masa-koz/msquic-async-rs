name: CI

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - release/*
  pull_request:
    branches:
    - main
    - release/*

permissions: read-all

env:
  RUST_BACKTRACE: 1
  toolchain_style: stable
  toolchain_msrv: 1.85.0
  toolchain_h3_msquic_msrv: 1.85.0
  toolchain_doc: nightly-2024-12-11
  toolchain_lint: stable
  toolchain_fuzz: nightly-2024-12-11

jobs:
  ci-pass:
    name: CI is green
    runs-on: ubuntu-latest
    needs:
      - style
      - lint
      - msrv
      - msrv_h3_msquic
      - test
      - doc
    steps:
      - run: exit 0

  style:
    name: Check Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          submodules: true
      - name: Prepare Machine for msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: msquic
      - name: Prepare Machine for seera-msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: seera-msquic
      - name: Install Rust ${{ env.toolchain_style }}
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ env.toolchain_style }}
          override: true
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt -p msquic-async -p h3-msquic-async -- --check
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: -p msquic-async -p h3-msquic-async -- --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          submodules: true
      - name: Prepare Machine for msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: msquic
      - name: Prepare Machine for seera-msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: seera-msquic
      - name: Install Rust ${{ env.toolchain_lint }}
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ env.toolchain_lint }}
          override: true
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --all-targets -- -D warnings

  msrv:
    name: Check MSRV
    needs: [style]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          submodules: true
      - name: Prepare Machine for msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: msquic
      - name: Prepare Machine for seera-msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: seera-msquic
      - name: Install Rust ${{ env.toolchain_msrv }}
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ env.toolchain_msrv }}
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: cargo check -p msquic-async
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: -p msquic-async

  msrv_h3_msquic:
    name: Check MSRV of `h3-msquic-async`
    needs: [style]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          submodules: true
      - name: Prepare Machine for msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: msquic
      - name: Prepare Machine for seera-msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: seera-msquic
      - name: Install Rust ${{ env.toolchain_h3_msquic_msrv }}
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ env.toolchain_h3_msquic_msrv }}
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: cargo check -p h3-msquic-async
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: -p h3-msquic-async

  test:
    needs: [style]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        vec: [
          { version: "msquic-latest", tls: "quictls", features: "" },
          { version: "msquic-latest", tls: "quictls", features: "--features static" },
          { version: "msquic-seera", tls: "quictls", features: "--no-default-features --features tokio,msquic-seera" },
          { version: "msquic-seera", tls: "quictls", features: "--no-default-features --features tokio,msquic-seera,msquic-seera-static" },
        ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          submodules: true
      - name: Prepare Machine for msquic
        if: matrix.vec.version == 'msquic-latest'
        run: scripts/prepare-machine.ps1 -Tls ${{ matrix.vec.tls }} -ForBuild -InstallTestCertificates
        shell: pwsh
        working-directory: msquic
      - name: Prepare Machine for seera-msquic
        if: matrix.vec.version == 'msquic-seera'
        run: scripts/prepare-machine.ps1 -Tls ${{ matrix.vec.tls }} -ForBuild -InstallTestCertificates
        shell: pwsh
        working-directory: seera-msquic
      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Pin macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=14.5" >> "$GITHUB_ENV"
      - name: Install NASM
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b
      - name: Set up MSVC dev environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: -p msquic-async ${{ matrix.vec.features }}

  doc:
    name: Build docs
    needs: [style]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          submodules: true
      - name: Prepare Machine for msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: msquic
      - name: Prepare Machine for seera-msquic
        run: scripts/prepare-machine.ps1 -Tls quictls -ForBuild
        shell: pwsh
        working-directory: seera-msquic
      - name: Install Rust ${{ env.toolchain_doc }}
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ env.toolchain_doc }}
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: cargo rustdoc -p msquic-async -- -D rustdoc::broken_intra_doc_links
        uses: actions-rs/cargo@v1
        with:
          command: rustdoc
          args: -p msquic-async -- -D rustdoc::broken_intra_doc_links
